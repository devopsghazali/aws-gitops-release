apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-devsecops-gitops-release
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devopsghazali/aws-devsecops-gitops-release.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: devsecops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
