apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-devsecops-gitops-release
  labels:
    app: aws-devsecops-gitops-release
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-devsecops-gitops-release
  template:
    metadata:
      labels:
        app: aws-devsecops-gitops-release
    spec:
      containers:
        - name: app
          image: devopsghazali/aws-devsecops-gitops-release:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
